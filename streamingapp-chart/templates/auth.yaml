apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 640928554403.dkr.ecr.us-east-1.amazonaws.com/streamingapp-auth:latest
        ports:
        - containerPort: 3001
        env:
        - name: MONGO_URI
          value: {{ .Values.mongoUri | quote }}
        - name: JWT_SECRET
          value: {{ .Values.jwtSecret | quote }}
        - name: PORT
          value: "3001"
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_S3_BUCKET
          value: "streamingapp-bucket-640928554403"
---
apiVersion: v1
kind: Service
metadata:
  name: auth
spec:
  type: ClusterIP
  selector:
    app: auth
  ports:
  - port: 3001
    targetPort: 3001
