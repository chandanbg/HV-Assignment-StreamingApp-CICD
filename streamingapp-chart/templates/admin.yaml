apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: admin
        image: 640928554403.dkr.ecr.us-east-1.amazonaws.com/streamingapp-admin:v2
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: MONGO_URI
          value: {{ .Values.mongoUri | quote }}
        - name: JWT_SECRET
          value: {{ .Values.jwtSecret | quote }}
        - name: CLIENT_URLS
          value: {{ .Values.clientUrl | quote }}
        - name: AWS_REGION
          value: "ap-south-1"
        - name: AWS_S3_BUCKET
          value: "streamingapp-bucket-640928554403"
---
apiVersion: v1
kind: Service
metadata:
  name: admin
spec:
  type: ClusterIP
  selector:
    app: admin
  ports:
  - port: 3003
    targetPort: 3003
